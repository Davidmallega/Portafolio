<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particles Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000c1a; }

    #particles-js {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* Demo overlay — simula el contenido del portfolio encima */
    .demo {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-family: 'Courier New', monospace;
      color: rgba(200, 230, 255, 0.85);
      text-align: center;
      padding: 2rem;
      pointer-events: none;
    }

    .demo h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #fff;
    }

    .demo p {
      font-size: 13px;
      color: #4ec9b0;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .demo small {
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      position: fixed;
      bottom: 14px;
      right: 16px;
    }
  </style>
</head>
<body>

<div id="particles-js"></div>

<div class="demo">
  <p>Fullstack Developer</p>
  <h1>David Mallega</h1>
  <small>particles-preview · abrir en Chrome/Edge</small>
</div>

<!-- particles.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script>
particlesJS('particles-js', {
  particles: {
    number: {
      value: 80,
      density: { enable: true, value_area: 900 }
    },
    color: { value: ['#00d4ff', '#00aaff', '#0077ff', '#33eeff', '#00ffee'] },
    shape: { type: 'circle' },
    opacity: {
      value: 0.7,
      random: true,
      anim: { enable: true, speed: 1, opacity_min: 0.2, sync: false }
    },
    size: {
      value: 3,
      random: true,
      anim: { enable: false }
    },
    line_linked: {
      enable: true,
      distance: 150,
      color: '#0099ff',
      opacity: 0.5,
      width: 1
    },
    move: {
      enable: true,
      speed: 0.8,
      direction: 'none',
      random: true,
      straight: false,
      out_mode: 'out',
      bounce: false,
    }
  },
  interactivity: {
    detect_on: 'canvas',
    events: {
      onhover: { enable: true, mode: 'grab' },
      onclick: { enable: true, mode: 'push' },
      resize: true
    },
    modes: {
      grab:   { distance: 160, line_linked: { opacity: 0.6 } },
      push:   { particles_nb: 3 },
    }
  },
  retina_detect: true
})
</script>
</body>
</html>
